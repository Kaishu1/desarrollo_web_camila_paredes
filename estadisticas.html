<!DOCTYPE html>
<html>

    <head>
        <link rel="stylesheet" href="estadisticas.css">
    </head>

<body>
  <header>
    <h1>♡ Estadísticas ♡</h1>
  </header>

<main class="contenedor-estadisticas">
    
  <section class="tarjeta-grafico">
    <h2>Miembros por tipo:</h2>

    <div class="grafico">
      <div class="barra">
        <span class="etiqueta">Pregrado</span>
        <div class="valor" style="width: 40%;">4</div>
      </div>

      <div class="barra">
        <span class="etiqueta">Postgrado</span>
        <div class="valor" style="width: 10%;">1</div>
      </div>

      <div class="barra">
        <span class="etiqueta">Funcionario</span>
        <div class="valor" style="width: 30%;">3</div>

    </div>

     <div class="barra">
        <span class="etiqueta">Académicos</span>
        <div class="valor" style="width: 20%;">2</div>
      </div>
    </div>

  <!-- Actividades -->
  <section class="tarjeta-grafico">
    <h2>Actividades por tipo:</h2>

    <div class="grafico">
      <div class="barra">
        <span class="etiqueta">Deporte</span>
        <div class="valor" style="width: 30%;">3</div>
      </div>

      <div class="barra">
        <span class="etiqueta">Artístico</span>
        <div class="valor" style="width: 30%;">3</div>
      </div>

      <div class="barra">
        <span class="etiqueta">Educativo</span>
        <div class="valor" style="width: 20%;">2</div>
      </div>

    <div class="barra">
        <span class="etiqueta">Social / Voluntariado</span>
        <div class="valor" style="width: 10%;">1</div>
      </div>

      <div class="barra">
        <span class="etiqueta">Recreativo</span>
        <div class="valor" style="width: 10%;">1</div>
      </div>
    </div>
  </section>

</main>
</body>
</html>
