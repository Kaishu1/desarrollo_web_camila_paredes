<!DOCTYPE html>
<html>
    <h1>Formulario de registro miembros</h1>
    <form>
        <fieldset>
            <div>
                <label for="nombre">  Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required> 
            </div> 
            <div>       
                <label for="correo"> Correo </label>
                <input type="email" id="correo" name="correo" required>
                
            </div>

            <div>       
                <label for="telefono"> Teléfono </label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>

            <div>  
                <!-- no required pq miembro puede que no tenga telegram-->     
                <label for="telegram"> Usuario de Telegram </label>
                <input type="text" id="telegram" name="telegram"> 
            </div>
            <!-- Idea para añadir: si no tiene telegram, que tenga la opción de seleccionar otra red social y especificar su nombre de usuario-->

            <div>
                <label for="tipo"> Tipo de miembro:</label>
                <select id="tipo" name="tipo" required>
                    <option value="" selected disabled> Seleccione una opción</option>
                    <option value="pregrado"> Estudiante de Pregrado </option> <option value="postgrado"> Estudiante de Postgrado</option>
                    <option value="funcionario"> Funcionario </option>
                    <option value="academico"> Académico </option>
                </select>

            </div>
        </fieldset>
    </form>

    <h1>Actividades</h1>

    <form>
        <fieldset>
            <div>
                <label for="tipoActividad" > ¿Qué actividad realizas?</label>
                <input type="text" id="tipoActividad">
            </div>
            <div>
                <label for="categoriaActividad"> Categoría </label>
                <select id="categoriaActividad">
                    <option value=""selected disabled> Seleccione una opción</option>
                    <option value="deporte">Deporte</option>
                    <option value="artistico">Artístico</option>
                    <option value="educativo">Educativo</option>
                    <option value="social"> Social / Voluntariado</option>
                    <option value="recreativo">Recreativo</option>
                </select>
            </div>

            <div>
                <label for="diasActividad"> Días </label>
                <input type="text" id="diasActividad" >
            </div>

            <div>
                <label for="horasActividad"> Horas </label>
                <input type="text" id="horasActividad" >
            </div>

            <div>
                <label for="imagenActividad">Imagen</label>
                <input type="file" id="imagenActividad" accept="image/*">
            </div>
            
            <div>
                <label for="videoActividad">Video</label>
                <input type="file" id="videoActividad" accept="video/*">
            </div>

        </fieldset>
    </form>

</html>
