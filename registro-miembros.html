<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>meow</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        .error { color: #c0392b; font-size: 0.85em; display: none; }
        .error.visible { display: block; }
        .actividad-item { border: 1px solid #ccc; padding: 10px; margin: 8px 0; border-radius: 4px; }
        .actividad-item .tipo { font-size: 0.8em; color: #666; text-transform: uppercase; }
        .actividad-item .nombre { font-weight: bold; }
        .contador { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>

<body>

    <h1>Formulario de registro miembros</h1>


    <form id="form-registro">
        <fieldset>
            <div>
                <label for="nombre">  Nombre completo</label>
                <input type="text" id="nombre" name="nombre"> 
            </div> 
            <br>
            <div>       
                <label for="correo"> Correo </label>
                <input type="email" id="correo" name="correo">
                
            </div>
            <br>
            <div>       
                <label for="telefono"> Teléfono </label>
                <input type="tel" id="telefono" name="telefono">
            </div>
            <br>
            <div>  
                <!-- no required pq miembro puede que no tenga telegram-->     
                <label for="telegram"> Usuario de Telegram </label>
                <input type="text" id="telegram" name="telegram"> 
            </div>
            <!-- Idea para añadir: si no tiene telegram, que tenga la opción de seleccionar otra red social y especificar su nombre de usuario-->
            <br>
            <div>
                <label for="tipoMiembro"> Tipo de miembro:</label>
                <select id="tipoMiembro" name="tipo">
                    <option value=""> -- Seleccione una opción --</option>
                    <option value="pregrado"> Estudiante de Pregrado </option>
                    <option value="postgrado"> Estudiante de Postgrado</option>
                    <option value="funcionario"> Funcionario </option>
                    <option value="academico"> Académico </option>
                </select>
                

            </div>
            <button type="submit"> Registrarse </button>
        </fieldset>
    </form>

    
 

    <h1>Actividades</h1>

    <form id="form-actividad">
        <fieldset>
            <div>
                <label for="nombreActividad" > ¿Qué actividad realizas?</label>
                <input type="text" id="nombreActividad">
                <span class="error" id="errorNombreActividad"> Debe ingresar una actividad </span>
            </div>
            <br>
            <div>
                <label for="tipoActividad"> Tipo: </label>
                <select id="tipoActividad">
                    <option value=""> -- Seleccione una opción -- </option>
                    <option value="deporte">Deporte</option>
                    <option value="artistico">Artístico</option>
                    <option value="educativo">Educativo</option>
                    <option value="social"> Social / Voluntariado</option>
                    <option value="recreativo">Recreativo</option>
                </select>
                <span class="error" id="errorTipoActividad"> Debe seleccionar un tipo. </span>
            </div>
            <br>
            <div>
                <label for="horasActividad">Horas semanales dedicadas:</label>
                <input type="number" id="horasActividad" min="1" max="40">
                <span class="error" id="errorHorasActividad" visible>Ingrese un número entre 1 y 40.</span>
            </div>
            <br>

            <div>
                <label for="imagenActividad">Imagen</label>
                <input type="file" id="imagenActividad" accept="image/*">
            </div>
            <br>
            <div>
                <label for="videoActividad">Video</label>
                <input type="file" id="videoActividad" accept="video/*">
            </div>
            <br>
            <button type="submit"> Enviar </button>
        </fieldset>
        
        
    </form>

    <script src="validador-form-registro.js"></script>
    <script src="validador-form-actividad.js"></script>
</body>
</html>
